<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>
<div class="px-4 py-8 md:px-6 md:py-12 max-w-7xl mx-auto min-h-screen lg:mr-52 lg:ml-52">
    <div class="text-center mb-8 md:mb-12">
        <h1 class="text-3xl md:text-4xl font-semibold mb-4">Meet Our Agents</h1>
        <p class=" text-lg md:text-xl text-muted-foreground">
            Our team of experienced professionals is here to help you find your perfect property
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-16">
        <app-agent-card *ngFor="let agent of agents" [agent]="agent">
        </app-agent-card>
    </div>

    <div *ngIf="agents.length === 8" class="text-center mt-10">
        <button (click)="seeMoreClick()"
            class="inline-flex items-center gap-2 px-8 py-3 border-2 border-primary text-primary hover:bg-primary hover:text-white rounded-xl font-medium transition-all duration-300 group">
            See More
            <lucide-angular [img]="ArrowRight"
                class="w-4 h-4 group-hover:translate-x-1 transition-transform"></lucide-angular>
        </button>
    </div>

</div>
<section class="py-20 bg-gradient-to-br from-[#FF7F50] to-[#FF6347]">
            <div class="container mx-auto px-4 max-w-7xl text-center">
                <h2 class="text-3xl md:text-4xl font-semibold text-white mb-6">
                    Want to Become an Agent? </h2>
                <p class="text-white/90 text-lg mb-10 max-w-2xl mx-auto">
                    Join our team of professional real estate agents and grow your career with LK Estate.
                </p>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <button
                        class="w-full sm:w-auto px-8 py-3 bg-white text-[#FF6347] font-semibold rounded-xl hover:bg-gray-50 transition-colors shadow-lg">
                        Apply Now
                    </button>

                </div>
            </div>
        </section>
    
<div>
    
    <app-footer></app-footer>
</div>
