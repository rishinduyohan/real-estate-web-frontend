<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>
<div class="min-h-screen bg-gray-50 py-8">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">My Properties</h1>
                <p class="text-gray-600 mt-1">Manage your property listings</p>
            </div>
            <app-add-property (saved)="loadMyProperties()"></app-add-property>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <lucide-angular [img]="Search" class="w-5 h-5 text-gray-400"></lucide-angular>
                </div>
                <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()"
                    placeholder="Search properties by title, location, or type..."
                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-full leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 sm:text-sm">
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <app-property-table [allProperties]="filteredProperties" (deleted)="onDelete($event)"
                (refreshRequest)="loadMyProperties()"> </app-property-table>

            <div *ngIf="filteredProperties.length === 0" class="p-12 text-center">
                <lucide-angular [img]="Search" class="mx-auto h-12 w-12 text-gray-400"></lucide-angular>
                <h3 class="mt-2 text-sm font-medium text-gray-900">No properties found</h3>
                <p class="mt-1 text-sm text-gray-500">Try adjusting your search terms or add a new property.</p>
                <div class="mt-6">
                    <app-add-property (saved)="loadMyProperties()"></app-add-property>
                </div>
            </div>
        </div>
    </div>
</div>
