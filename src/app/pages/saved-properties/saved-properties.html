<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>

<div class="min-h-screen bg-gray-50 py-8">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Saved Properties</h1>
            <p class="text-gray-600 mt-1">Your favorite properties in one place.</p>
        </div>

        <div *ngIf="loading" class="text-center py-12">
            <p class="text-gray-500">Loading saved properties...</p>
        </div>

        <div *ngIf="!loading && savedProperties.length === 0"
            class="text-center py-12 bg-white rounded-xl border border-gray-100 shadow-sm">
            <div class="mx-auto w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-400" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900">No saved properties yet</h3>
            <p class="text-gray-500 mt-1 mb-6">Start browsing properties and save your favorites here.</p>
            <a routerLink="/properties"
                class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                Browse Properties
            </a>
        </div>

        <div *ngIf="!loading && savedProperties.length > 0"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <app-property-card *ngFor="let property of savedProperties" [id]="property.id.toString()"
                [image]="property.image" [title]="property.title" [price]="property.price" [area]="property.location"
                [status]="property.status" [type]="property.type" [bedrooms]="property.details.bedrooms"
                [bathrooms]="property.details.bathrooms" [size]="property.size" (cardClick)="onPropertyClick($event)">
            </app-property-card>
        </div>
    </div>
</div>
