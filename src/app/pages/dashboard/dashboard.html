<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>
<div class="min-h-screen bg-background pb-24 md:pb-8">
    <div class="px-6 py-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl mb-2 font-semibold">Dashboard</h1>
            <p class="text-muted-foreground">
                Welcome back! Here's what's happening with your properties.
            </p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div *ngFor="let stat of stats" class="bg-card rounded-none p-6 shadow-sm">
                <div class="flex items-start justify-between mb-4">
                    <div [ngClass]="['w-12 h-12 rounded-xl flex items-center justify-center', stat.bgColor]">
                        <lucide-angular [img]="stat.icon" [class]="'w-6 h-6 ' + stat.color"></lucide-angular>
                    </div>
                    <span class="text-sm text-green-600 bg-green-50 px-2 py-1 rounded-lg">
                        {{ stat.change }}
                    </span>
                </div>
                <p class="text-2xl md:text-3xl mb-1 font-normal">{{ stat.value }}</p>
                <p class="text-sm text-muted-foreground">{{ stat.label }}</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Recent Inquiries -->
            <div class="lg:col-span-2 bg-card rounded-2xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-semibold text-lg">Recent Inquiries</h3>
                    <button class="text-primary text-sm hover:underline font-medium">View All</button>
                </div>

                <app-admin-inquiries></app-admin-inquiries>
            </div>

            <!-- Top Properties -->
            <div class="bg-card rounded-2xl p-6 shadow-sm">
                <h3 class="mb-6 font-semibold text-lg">Top Properties</h3>

                <div class="space-y-4">
                    <div *ngFor="let property of topProperties" class="flex gap-3">
                        <img [src]="property.image" [alt]="property.title" class="w-16 h-16 rounded-xl object-cover" />
                        <div class="flex-1 min-w-0">
                            <p class="font-medium line-clamp-1 mb-1">{{ property.title }}</p>
                            <div class="flex items-center gap-3 text-xs text-muted-foreground">
                                <div class="flex items-center gap-1">
                                    <lucide-angular [img]="Eye" class="w-3 h-3"></lucide-angular>
                                    <span>234</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    <lucide-angular [img]="Heart" class="w-3 h-3"></lucide-angular>
                                    <span>45</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    <lucide-angular [img]="Phone" class="w-3 h-3"></lucide-angular>
                                    <span>12</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Properties Table -->
        <div class="mt-6 bg-card rounded-2xl shadow-sm overflow-hidden">
            <div class="p-6 border-b border-border">
                <h3 class="font-semibold text-lg">Recent Properties</h3>
            </div>

           <app-property-table></app-property-table>
        </div>
    </div>
</div>
