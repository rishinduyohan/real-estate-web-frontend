<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>

<div class="min-h-screen bg-gray-50 py-8">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Inquiries</h1>
                <p class="text-gray-600 mt-1">Manage and respond to customer inquiries</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <lucide-angular [img]="Search" class="h-5 w-5 text-gray-400"></lucide-angular>
                </div>
                <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()"
                    placeholder="Search inquiries by name, email, or property..."
                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-full leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 sm:text-sm">
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <app-inquiry-card *ngFor="let inquiry of filteredInquiries" [inquiry]="inquiry"
                [currentUserId]="currentUserId" [isAdmin]="isAdmin" (reply)="openReplyModal($event)"
                (delete)="deleteInquiry($event)">
            </app-inquiry-card>

            <div *ngIf="filteredInquiries.length === 0"
                class="col-span-full py-16 text-center bg-white rounded-xl shadow-sm border border-gray-100">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4">
                    <lucide-angular [img]="MessageCircle" class="w-8 h-8 text-gray-400"></lucide-angular>
                </div>
                <h3 class="text-lg font-medium text-gray-900 mb-1">No Inquiries Found</h3>
                <p class="text-gray-500">There are currently no inquiries matching your search criteria.</p>
            </div>
        </div>
    </div>
</div>

<div *ngIf="isReplyModalOpen" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" (click)="closeReplyModal()"></div>

    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                        Reply to {{ selectedInquiry?.name }}
                    </h3>
                    <button (click)="closeReplyModal()"
                        class="bg-white rounded-md text-gray-400 hover:text-gray-500 focus:outline-none">
                        <span class="sr-only">Close</span>
                        <lucide-angular [img]="X" class="h-6 w-6"></lucide-angular>
                    </button>
                </div>

                <div class="mt-2 space-y-4">
                    <div class="bg-gray-50 p-4 rounded-md">
                        <p class="text-sm text-gray-500 mb-1"><span class="font-medium text-gray-700">Property:</span>
                            {{ selectedInquiry?.propertyTitle || 'N/A' }}</p>
                        <p class="text-sm text-gray-500 mb-2"><span class="font-medium text-gray-700">Message:</span>
                        </p>
                        <p class="text-sm text-gray-600 italic">"{{ selectedInquiry?.message }}"</p>
                    </div>

                    <div>
                        <label for="reply" class="block text-sm font-medium text-gray-700 mb-1">Your Reply</label>
                        <textarea id="reply" rows="5" [(ngModel)]="replyMessage"
                            class="shadow-sm focus:ring-primary-500 focus:border-primary-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border"
                            placeholder="Type your reply here..."
                            [disabled]="selectedInquiry?.status === 'RESPONDED'"></textarea>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button type="button" (click)="sendReply()"
                    [disabled]="!replyMessage || selectedInquiry?.status === 'RESPONDED'"
                    class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-primary text-base font-medium text-white hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                    <lucide-angular [img]="Send" class="h-4 w-4 mr-2"></lucide-angular>
                    Send Reply
                </button>
                <button type="button" (click)="closeReplyModal()"
                    class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>
