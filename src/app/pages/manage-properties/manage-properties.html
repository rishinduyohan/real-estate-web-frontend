<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>
<div class="min-h-screen bg-gray-50 py-8">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Manage Properties</h1>
                <p class="text-gray-600 mt-1">View, edit, and manage your property listings</p>
            </div>
            <app-add-property (saved)="loadAll()"></app-add-property>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()"
                    placeholder="Search properties by title, location, or type..."
                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-full leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 sm:text-sm">
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <app-property-table [allProperties]="filteredProperties" (deleted)="onDelete($event)"
                (refreshRequest)="loadAll()"> </app-property-table>

            <div *ngIf="filteredProperties.length === 0" class="p-12 text-center">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">No properties found</h3>
                <p class="mt-1 text-sm text-gray-500">Try adjusting your search terms or add a new property.</p>
                <div class="mt-6">
                    <app-add-property (saved)="loadAll()"></app-add-property>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Property Modal is now handled by app-add-property component -->
