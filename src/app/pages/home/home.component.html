<div class="min-h-screen flex flex-col bg-background font-sans">
  <div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
  </div>

  <main class="flex-grow">
    @if (!isAuthenticated) {
    <app-hero></app-hero>
    <app-stats></app-stats>
    <app-featured-properties></app-featured-properties>
    <app-why-choose-us></app-why-choose-us>
    <app-reviews></app-reviews>
    <app-cta></app-cta>
    } @else {
    <div class="container mx-auto px-4 py-8">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-foreground">Welcome back, {{ userName }}</h2>
        <p class="text-muted-foreground">Here's what's happening with your properties.</p>
      </div>
      <router-outlet></router-outlet>
    </div>
    }
  </main>
  <app-footer></app-footer>
</div>
