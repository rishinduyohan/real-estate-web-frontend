<div class="bg-white rounded-none shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50/50 border-b border-gray-100">
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        User</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Contact</th>

                    <th *ngIf="activeTab === 'OWNERS'"
                        class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Joined Date</th>
                    <th *ngIf="activeTab === 'CUSTOMERS'"
                        class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Joined Date</th>

                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                        Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr *ngFor="let user of users" class="hover:bg-gray-50/50 transition-colors group">
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-4">
                            <img [src]="user.imageUrl || 'https://via.placeholder.com/150'" alt="Profile"
                                class="w-10 h-10 rounded-full object-cover">
                            <div>
                                <div class="font-medium text-gray-900">{{ user.username }}
                                </div>
                                <div class="text-xs text-gray-500 mt-0.5">
                                    <ng-container *ngIf="activeTab === 'OWNERS'">
                                        {{ user.properties?.length || 0 }} Properties
                                    </ng-container>
                                    <ng-container *ngIf="activeTab === 'CUSTOMERS'">
                                        {{ user.role | titlecase }}
                                    </ng-container>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-6">
                        <div class="flex flex-col gap-1 text-sm text-gray-600">
                            <div class="flex items-center gap-2">
                                <lucide-angular [img]="Mail" class="w-3.5 h-3.5 text-gray-400"></lucide-angular>
                                {{ user.email }}
                            </div>
                            <div class="flex items-center gap-2">
                                <lucide-angular [img]="Home" class="w-3.5 h-3.5 text-gray-400"></lucide-angular>
                                {{ user.phone || 'N/A' }}
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-6">
                        <span *ngIf="activeTab === 'OWNERS'"
                            class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700">
                            <lucide-angular [img]="Star" class="w-3.5 h-3.5"></lucide-angular>
                            {{  user.createdAt | date }}
                        </span>
                        <span *ngIf="activeTab === 'CUSTOMERS'"
                            class="inline-flex items-center gap-1.5 text-sm text-gray-600">
                            {{ user.createdAt | date }}
                        </span>
                    </td>
                    <td class="py-4 px-6 text-right">
                        <div
                            class="flex items-center justify-end gap-2 opacity-100 group-hover:opacity-100 transition-opacity">
                            <button (click)="edit.emit(user)"
                                class="p-2 text-gray-400 hover:text-primary hover:bg-primary/5 rounded-lg transition-colors"
                                title="Edit">
                                <lucide-angular [img]="Edit" class="w-4 h-4"></lucide-angular>
                            </button>
                            <button (click)="delete.emit(user.id)"
                                class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                title="Delete">
                                <lucide-angular [img]="Trash2" class="w-4 h-4"></lucide-angular>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="users.length === 0">
                    <td colspan="4" class="py-12 text-center text-gray-500">
                        <div class="flex flex-col items-center justify-center">
                            <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                                <lucide-angular [img]="Search" class="w-8 h-8 text-gray-300"></lucide-angular>
                            </div>
                            <p class="text-base font-medium text-gray-900">No {{ activeTab }} found</p>
                            <p class="text-sm mt-1">Try adjusting your search query.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
