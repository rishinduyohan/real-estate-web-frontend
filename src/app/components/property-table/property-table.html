<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col"
                        class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Property</th>
                    <th scope="col"
                        class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Type</th>
                    <th scope="col"
                        class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Status</th>
                    <th scope="col"
                        class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Price</th>
                    <th scope="col"
                        class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr *ngFor="let property of allProperties" class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="h-16 w-24 flex-shrink-0">
                                <img class="h-16 w-24 rounded-lg object-cover"
                                    [src]="property.images && property.images.length > 0 ? property.images[0] : ''"
                                    [alt]="property.title">
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-semibold text-gray-900 line-clamp-1">{{ property.title
                                    }}</div>
                                <div class="text-sm text-gray-500 line-clamp-1">{{ property.location }}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">{{ property.type }}</div>
                        <div class="text-xs text-gray-500">{{ property.size }}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full" [ngClass]="{
                    'bg-green-100 text-green-800': property.status === 'Available',
                    'bg-blue-100 text-blue-800': property.status === 'Rented'
                  }">
                            {{ property.status }}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">
                        Rs. {{ property.price }}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <div class="flex items-center justify-end space-x-3">
                            <a [routerLink]="['/propertyDetail', property.id]"
                                class="text-gray-400 hover:text-primary transition-colors" title="View">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </a>
                            <button (click)="onEdit(property)"
                                class="text-gray-400 hover:text-blue-600 transition-colors" title="Edit">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 00 2 2h11a2 2 0 00 2-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button (click)="deleteProperty(property.id || 0)"
                                class="text-gray-400 hover:text-red-600 transition-colors" title="Delete">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <app-edit-property *ngIf="isEditModalOpen && selectedProperty" [property]="selectedProperty" [isModal]="true"
        (saved)="handleSaved()" (closed)="handleClosed()">
    </app-edit-property>
</div>
