<div class="overflow-x-auto">
    <table class="w-full">
        <thead class="bg-secondary">
            <tr>
                <th class="text-left p-4 text-sm font-medium text-muted-foreground">Property</th>
                <th class="text-left p-4 text-sm font-medium text-muted-foreground">Location</th>
                <th class="text-left p-4 text-sm font-medium text-muted-foreground">Type</th>
                <th class="text-left p-4 text-sm font-medium text-muted-foreground">Price</th>
                <th class="text-left p-4 text-sm font-medium text-muted-foreground">Status</th>
                <th class="text-left p-4 text-sm font-medium text-muted-foreground">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let property of allProperties"
                class="border-b border-border hover:bg-secondary/50 transition-all">
                <td class="p-4">
                    <div class="flex items-center gap-3">
                        <img [src]="property.image" [alt]="property.title" class="w-12 h-12 rounded-lg object-cover" />
                        <div>
                            <p class="font-medium line-clamp-1">{{ property.title }}</p>
                        </div>
                    </div>
                </td>
                <td class="p-4 text-sm text-muted-foreground">{{ property.location }}</td>
                <td class="p-4">
                    <span class="px-3 py-1 bg-secondary text-secondary-foreground rounded-lg text-sm font-medium">
                        {{ property.type }}
                    </span>
                </td>
                <td class="p-4 text-sm">Rs. {{ property.price }}</td>
                <td class="p-4">
                    <span [ngClass]="{
                  'bg-green-100 text-green-700': property.status === 'Available',
                  'bg-blue-100 text-blue-700': property.status === 'Rented',
                  'bg-secondary text-amber-700': property.status === 'Sold'
                }" class="px-3 py-1 rounded-lg text-sm font-medium">
                        {{ property.status }}
                    </span>
                </td>
                <td class="p-4">
                    <div class="flex gap-2">
                        <button
                            class="px-3 py-1 bg-primary text-primary-foreground rounded-none hover:opacity-90 text-sm font-medium">
                            Edit
                        </button>
                        <button [routerLink]="['/propertyDetail', property.id]"
                            class="px-3 py-1 bg-secondary text-secondary-foreground rounded-none hover:bg-[#ffe8dd] text-sm font-medium">
                            View
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
