<div
    class="relative min-h-screen flex items-center justify-center bg-gradient-to-br from-[#FF7F50] to-[#FF6347] overflow-hidden">
    <div class="absolute inset-0 opacity-10">
        <div
            class="absolute top-0 left-0 w-96 h-96 bg-white rounded-full mix-blend-overlay filter blur-3xl transform -translate-x-1/2 -translate-y-1/2">
        </div>
        <div
            class="absolute bottom-0 right-0 w-96 h-96 bg-white rounded-full mix-blend-overlay filter blur-3xl transform translate-x-1/2 translate-y-1/2">
        </div>
    </div>

    <div class="relative z-10 container mx-auto px-4 max-w-5xl text-center">
        <h1 class="text-4xl md:text-6xl font-bold text-white mb-6 leading-tight animate-fade-in-up">
            Find Your Dream Property<br />in Sri Lanka
        </h1>
        <p class="text-lg md:text-xl text-white/90 mb-12 max-w-2xl mx-auto animate-fade-in-up delay-100">
            Discover the perfect home, land, or commercial space from our extensive collection of verified properties
        </p>

        <div
            class="bg-white rounded-2xl p-4 shadow-2xl max-w-4xl mx-auto transform hover:scale-[1.01] transition-transform duration-300 animate-fade-in-up delay-200">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative group">
                    <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                        <lucide-angular [img]="Search"
                            class="w-5 h-5 text-gray-400 group-focus-within:text-primary transition-colors"></lucide-angular>
                    </div>
                    <input type="text" placeholder="Enter location or property..."
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                </div>

                <div class="md:w-64">
                    <select
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none cursor-pointer hover:bg-gray-100 transition-colors">
                        <option>All Property Types</option>
                        <option>House</option>
                        <option>Apartment</option>
                        <option>Land</option>
                        <option>Commercial</option>
                    </select>
                </div>

                <button
                    class="bg-primary hover:bg-[#ff5722] text-white px-8 py-3 rounded-xl font-medium transition-all duration-300 flex items-center justify-center gap-2 shadow-lg hover:shadow-primary/30 active:transform active:scale-95">
                    <lucide-angular [img]="Search" class="w-5 h-5"></lucide-angular>
                    Search
                </button>
            </div>

            <div class="mt-4 flex flex-wrap items-center gap-2 text-sm text-gray-400 pb-1">
                <span>Popular:</span>
                <button class="text-[#FF6347] hover:underline hover:text-[#FF4500]">Colombo</button>
                <button class="text-[#FF6347] hover:underline hover:text-[#FF4500]">Kandy</button>
                <button class="text-[#FF6347] hover:underline hover:text-[#FF4500]">Galle</button>
                <button class="text-[#FF6347] hover:underline hover:text-[#FF4500]">Houses under 50M</button>
            </div>
        </div>
    </div>
</div>
