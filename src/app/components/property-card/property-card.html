<div (click)="onCardClick()"
    class="bg-card rounded-none overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 cursor-pointer group flex flex-row md:flex-col h-auto md:h-auto">
    <div class="relative w-1/3 min-w-[120px] md:w-full md:h-48 shrink-0">
        <img [src]="image" [alt]="title"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
            onerror="this.src='https://placehold.co/600x400?text=No+Image'" />

        <div
            class="hidden md:block absolute top-3 left-3 bg-primary text-primary-foreground px-3 py-1 rounded-lg text-sm font-medium">
            {{ status }}
        </div>
        <div
            class="hidden md:block absolute top-3 right-3 bg-white/90 backdrop-blur-sm text-foreground px-3 py-1 rounded-lg text-sm font-medium">
            {{ type }}
        </div>
    </div>

    <div class="flex-1 p-3 md:p-4 flex flex-col justify-between">
        <div>
            <h3 class="mb-1 md:mb-2 line-clamp-2 md:line-clamp-1 text-base md:text-lg font-medium leading-tight">{{
                title }}</h3>

            <div class="md:hidden flex flex-wrap gap-2 text-xs text-muted-foreground mb-1">
                <span class="text-primary font-medium">{{ status }}</span>
                <span>•</span>
                <span>{{ type }}</span>
            </div>

            <div class="flex items-center gap-1 text-muted-foreground mb-2 md:mb-3">
                <lucide-angular [img]="MapPin" class="w-3 h-3 md:w-4 md:h-4 shrink-0"></lucide-angular>
                <span class="text-xs md:text-sm line-clamp-1">{{ area }}</span>
            </div>
        </div>

        <div>
            <div class="flex items-center gap-3 md:gap-4 mb-2 md:mb-3 text-xs md:text-sm text-muted-foreground">
                <div *ngIf="bedrooms > 0" class="flex items-center gap-1">
                    <lucide-angular [img]="Bed" class="w-3 h-3 md:w-4 md:h-4"></lucide-angular>
                    <span>{{ bedrooms }}</span>
                </div>
                <div *ngIf="bathrooms > 0" class="flex items-center gap-1">
                    <lucide-angular [img]="Bath" class="w-3 h-3 md:w-4 md:h-4"></lucide-angular>
                    <span>{{ bathrooms }}</span>
                </div>
                <div *ngIf="area" class="flex items-center gap-1">
                    <lucide-angular [img]="Maximize" class="w-3 h-3 md:w-4 md:h-4"></lucide-angular>
                    <span>{{ size }}</span>
                </div>
            </div>

            <div class="pt-2 md:pt-3 border-t border-border flex justify-between items-center">
                <p class="text-primary font-bold text-sm md:text-base md:text-primary md:font-semibold">
                    Rs. {{ price }}
                </p>
            </div>
        </div>
    </div>
</div>
