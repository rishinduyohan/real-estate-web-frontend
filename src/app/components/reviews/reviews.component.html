<section class="py-16 bg-gray-50 overflow-hidden">
    <div class="container mx-auto px-4 max-w-7xl relative">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-normal text-gray-900 mb-4">What Our Clients Say</h2>
            <p class="text-gray-600 max-w-2xl mx-auto">
                Read success stories from our satisfied customers
            </p>
        </div>

        <div class="hidden md:flex justify-between absolute top-1/2 left-0 right-0 z-10 px-2 -translate-y-1/2 pointer-events-none">
            <button (click)="scroll('left')" class="p-3 rounded-full bg-white shadow-lg pointer-events-auto hover:bg-gray-50 transition">
                <lucide-angular [img]="ChevronLeft" class="w-6 h-6 text-gray-700"></lucide-angular>
            </button>
            <button (click)="scroll('right')" class="p-3 rounded-full bg-white shadow-lg pointer-events-auto hover:bg-gray-50 transition">
                <lucide-angular [img]="ChevronRight" class="w-6 h-6 text-gray-700"></lucide-angular>
            </button>
        </div>

        <div #scrollContainer 
             class="flex overflow-x-auto gap-6 pb-8 snap-x snap-mandatory scrollbar-hide scroll-smooth px-4">
            
            <div *ngFor="let review of reviews"
                class="min-w-[90%] sm:min-w-[450px] snap-center">
                
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 h-full hover:shadow-md transition-shadow">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center text-[#FF6347]">
                            <lucide-angular [img]="User" class="w-7 h-7"></lucide-angular>
                        </div>
                        <div>
                            <h4 class="font-medium text-gray-900 text-lg">{{ review.name }}</h4>
                            <p class="text-sm text-gray-500 font-medium">{{ review.role }}</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-1 mb-4">
                        <lucide-angular *ngFor="let star of [1,2,3,4,5]" [img]="Star"
                            class="w-4 h-4 fill-yellow-400 text-yellow-400"></lucide-angular>
                    </div>
                    
                    <p class="text-gray-600 leading-relaxed italic text-base">
                        "{{ review.review }}"
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
