<section class="py-16 bg-gray-50">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="text-center mb-16">
            <h2 class="text-3xl md:text-4xl font-semibold text-gray-900 mb-4">What Our Clients Say</h2>
            <p class="text-gray-600 max-w-2xl mx-auto">
                Read success stories from our satisfied customers
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div *ngFor="let review of reviews"
                class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-12 h-12 bg-[#FF6347] rounded-full flex items-center justify-center text-white">
                        <lucide-angular [img]="User" class="w-6 h-6"></lucide-angular>
                    </div>
                    <div>
                        <h4 class="font-semibold text-gray-900">{{ review.name }}</h4>
                        <p class="text-sm text-gray-500">{{ review.role }}</p>
                    </div>
                </div>

                <div class="flex items-center gap-1 mb-4">
                    <lucide-angular *ngFor="let star of stars" [img]="Star"
                        class="w-4 h-4 fill-[#FFC107] text-[#FFC107]"></lucide-angular>
                </div>
                <p class="text-gray-600 leading-relaxed">
                    {{ review.review }}
                </p>
            </div>
        </div>
    </div>
</section>
