<nav class="bg-white border-b border-border sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between  h-16">
            <button class="flex items-center gap-2 group focus:outline-none" [routerLink]="['/']">
                <div
                    class="w-12 h-12 rounded-none flex items-center justify-center group-hover:scale-105 transition-transform">
                    <img src="https://res.cloudinary.com/dbndqriih/image/upload/logo_hokeaw" alt="Profile"
                        class="w-full h-full object-cover">
                </div>
                <div class="hidden sm:block text-left">
                    <h1 class="text-xl text-foreground font-medium">LK Estate</h1>
                    <p class="text-xs text-muted-foreground -mt-1">Real Estate Portal</p>
                </div>
            </button>

            <div class="hidden lg:flex items-center gap-1">
                    <button *ngFor="let item of navItems" [routerLink]="[item.link]"
                        routerLinkActive="bg-secondary text-primary" [routerLinkActiveOptions]="{exact: true}"
                        class="px-4 py-2 rounded-lg transition-all text-foreground hover:bg-secondary/50 font-medium">
                        {{ item.label }}
                    </button>
            </div>

            <div class="hidden lg:flex items-center gap-3">
                <ng-container *ngIf="isAuthenticated; else guestControls">
                    <ng-container *ngIf="userRole === 'admin'">
                        <button
                            class="bg-primary text-primary-foreground hover:bg-primary/90 px-4 py-2 rounded-lg text-sm font-medium flex items-center transition-colors">
                            <lucide-angular [img]="Plus" class="w-4 h-4 mr-2"></lucide-angular>
                            List Property
                        </button>
                    </ng-container>

                    <button *ngIf="userRole === 'customer'"
                        class="w-10 h-10 rounded-lg flex items-center justify-center hover:bg-secondary transition-all">
                        <lucide-angular [img]="Heart" class="w-5 h-5 text-muted-foreground"></lucide-angular>
                    </button>

                    <div class="relative">
                        <button (click)="toggleUserMenu()"
                            class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-secondary transition-all">
                            <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
                                <lucide-angular [img]="User" class="w-4 h-4 text-white"></lucide-angular>
                            </div>
                            <span class="text-sm font-medium">Account</span>
                        </button>

                        <div *ngIf="userMenuOpen"
                            class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-border overflow-hidden py-1">
                            <button class="w-full text-left px-4 py-3 hover:bg-secondary transition-all text-sm">
                                My Profile
                            </button>
                            <button
                                class="w-full text-left px-4 py-3 hover:bg-secondary transition-all border-t border-border text-sm">
                                Settings
                            </button>
                            <button (click)="onLogout()"
                                class="w-full text-left px-4 py-3 hover:bg-secondary transition-all border-t border-border text-destructive text-sm">
                                Logout
                            </button>
                        </div>
                    </div>
                </ng-container>

                <ng-template #guestControls>
                    <button (click)="onLogin()"
                        class="px-4 py-2 rounded-lg hover:bg-secondary transition-colors text-sm font-medium">
                        Sign In
                    </button>
                    <button (click)="onSignUp()"
                        class="bg-primary text-primary-foreground hover:bg-primary/90 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        Get Started
                    </button>
                </ng-template>
            </div>

            <button (click)="toggleMobileMenu()"
                class="lg:hidden w-10 h-10 flex items-center justify-center rounded-lg hover:bg-secondary transition-all">
                <lucide-angular *ngIf="!mobileMenuOpen" [img]="Menu" class="w-6 h-6"></lucide-angular>
                <lucide-angular *ngIf="mobileMenuOpen" [img]="X" class="w-6 h-6"></lucide-angular>
            </button>
        </div>
    </div>
    <div *ngIf="mobileMenuOpen" class="lg:hidden border-t border-border bg-white">
        <div class="px-4 py-4 space-y-2">
            <button *ngFor="let item of publicNavItems" [routerLink]="[item.link]" (click)="mobileMenuOpen = false" [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-secondary text-primary"
                class="w-full text-left px-4 py-3 rounded-lg transition-all text-foreground hover:bg-secondary/50 font-medium">
                {{ item.label }}
            </button>

            <div class="pt-4 border-t border-border space-y-2">
                <ng-container *ngIf="isAuthenticated; else mobileGuestControls">
                    <button class="w-full text-left px-4 py-3 rounded-lg hover:bg-secondary transition-all font-medium">
                        My Profile
                    </button>
                    <button (click)="onLogout()"
                        class="w-full text-left px-4 py-3 rounded-lg hover:bg-secondary transition-all text-destructive font-medium">
                        Logout
                    </button>
                </ng-container>

                <ng-template #mobileGuestControls>
                    <button (click)="onLogin()"
                        class="w-full text-center border border-border px-4 py-3 rounded-lg hover:bg-secondary transition-all font-medium">
                        Sign In
                    </button>
                    <button (click)="onSignUp()"
                        class="w-full text-center bg-primary text-primary-foreground px-4 py-3 rounded-lg hover:bg-primary/90 transition-all font-medium">
                        Get Started
                    </button>
                </ng-template>
            </div>
        </div>
    </div>
</nav>
