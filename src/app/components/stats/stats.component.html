<div class="py-16 bg-white">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <div *ngFor="let stat of stats" class="flex flex-col items-center text-center group cursor-default">
                <div
                    class="w-16 h-16 rounded-2xl bg-orange-50 flex items-center justify-center mb-4 transition-transform duration-300 group-hover:scale-110 group-hover:bg-orange-100">
                    <lucide-angular [img]="stat.icon" class="w-8 h-8 text-[#FF6347] stroke-[1.5]"></lucide-angular>
                </div>

                <h3 class="text-3xl font-bold text-gray-900 mb-2">{{ stat.count }}</h3>

                <p class="text-gray-500 font-medium text-sm">{{ stat.label }}</p>
            </div>
        </div>
    </div>
</div>
