<section class="py-16 bg-white overflow-hidden">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">Why Choose LK Estate?</h2>
            <p class="text-gray-600 max-w-2xl mx-auto">
                We make property transactions simple, secure, and stress-free
            </p>
        </div>

        <div class="flex overflow-x-auto md:grid md:grid-cols-3 gap-8 pb-8 md:pb-0 snap-x snap-mandatory scrollbar-hide px-2">
            
            <div *ngFor="let feature of features" 
                 class="min-w-[350px] sm:min-w-[350px] md:min-w-full snap-center flex flex-col items-center text-center p-10 bg-gray-50/50 rounded-3xl border border-gray-100 transition-all duration-300 hover:bg-white hover:shadow-xl hover:-translate-y-2 group cursor-default">
                
                <div class="flex flex-col items-center text-center">
    <div class="w-20 h-20 rounded-3xl bg-orange-50 flex items-center justify-center mb-6">
        <lucide-angular [img]="feature.icon" class="w-10 h-10 text-[#FF6347]"></lucide-angular>
    </div>

    <h3 class="text-xl font-bold text-gray-900 mb-4">{{ feature.title }}</h3>
    <p class="text-gray-500 leading-relaxed max-w-[250px]">
        {{ feature.description }}
    </p>
</div>
            </div>

        </div>
    </div>
</section>
