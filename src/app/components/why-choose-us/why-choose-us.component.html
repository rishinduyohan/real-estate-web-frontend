<section class="py-16 bg-white">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="text-center mb-16">
            <h2 class="text-3xl md:text-4xl font-semibold text-gray-900 mb-4">Why Choose LK Estate?</h2>
            <p class="text-gray-600 max-w-2xl mx-auto">
                We make property transactions simple, secure, and stress-free
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div *ngFor="let feature of features" class="flex flex-col items-center text-center group">
                <div
                    class="w-20 h-20 rounded-3xl bg-orange-50 flex items-center justify-center mb-6 transition-transform duration-300 group-hover:scale-110 group-hover:bg-orange-100">
                    <lucide-angular [img]="feature.icon" class="w-10 h-10 text-[#FF6347] stroke-[1.5]"></lucide-angular>
                </div>
                <h3 class="text-xl font-semibold text-gray-900 mb-4">{{ feature.title }}</h3>
                <p class="text-gray-500 leading-relaxed max-w-sm">
                    {{ feature.description }}
                </p>
            </div>
        </div>
    </div>
</section>
