<div class="sticky top-0 z-50">
    <app-navbar></app-navbar>
</div>

<div class="min-h-screen bg-gray-50 py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="bg-primary/10 px-6 py-8 text-center">
                <div class="w-16 h-16 bg-white rounded-full mx-auto flex items-center justify-center shadow-sm mb-4">
                    <lucide-angular [img]="UserIcon" class="w-8 h-8 text-primary"></lucide-angular>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Become an Agent</h1>
                <p class="text-gray-600 mt-2">Join a real estate agency and start your journey.</p>
            </div>

            <div class="p-8">
                <div *ngIf="successMessage"
                    class="mb-6 bg-green-50 border border-green-200 rounded-lg p-4 flex items-start">
                    <lucide-angular [img]="CheckCircle" class="w-5 h-5 text-green-500 mr-3 mt-0.5"></lucide-angular>
                    <p class="text-green-700">{{ successMessage }}</p>
                </div>

                <div *ngIf="!successMessage">
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Select an Agency/Owner</label>
                        <p class="text-sm text-gray-500 mb-3">Choose the property owner you wish to work with.</p>

                        <div class="space-y-3">
                            <div *ngFor="let owner of owners" (click)="selectedOwnerId = owner.id"
                                [class.border-primary]="selectedOwnerId === owner.id"
                                [class.bg-primary-50]="selectedOwnerId === owner.id"
                                class="flex items-center p-4 border rounded-xl cursor-pointer hover:border-primary transition-all">
                                <div class="w-12 h-12 bg-gray-200 rounded-full flex-shrink-0 overflow-hidden">
                                    <img *ngIf="owner.image" [src]="owner.image" class="w-full h-full object-cover">
                                    <span *ngIf="!owner.image"
                                        class="w-full h-full flex items-center justify-center text-gray-500 font-bold bg-gray-100">{{
                                        owner.fullName.charAt(0) }}</span>
                                </div>
                                <div class="ml-4">
                                    <h3 class="font-medium text-gray-900">{{ owner.fullName }}</h3>
                                    <p class="text-xs text-gray-500">{{ owner.email }}</p>
                                </div>
                                <div class="ml-auto" *ngIf="selectedOwnerId === owner.id">
                                    <lucide-angular [img]="CheckCircle" class="w-5 h-5 text-primary"></lucide-angular>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button (click)="submitRequest()" [disabled]="!selectedOwnerId || isSubmitting"
                        class="w-full bg-primary text-white font-medium py-3 rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                        <span *ngIf="!isSubmitting">Submit Application</span>
                        <span *ngIf="isSubmitting">Sending...</span>
                    </button>

                    <p class="text-center text-xs text-muted-foreground mt-4">
                        By submitting, you agree to our terms and conditions for agents.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
