<form (ngSubmit)="handleInquirySubmit()" class="space-y-4 bg-inherit">
    <div>
        <label class="block mb-1 text-sm font-medium">Your Name</label>
        <input type="text" [(ngModel)]="inquiryData.name" name="name"
            class="w-full px-4 py-2 bg-white border border-border rounded-xl focus:ring-2 focus:ring-primary" required>
    </div>
    <div>
        <label class="block mb-1 text-sm font-medium">Email</label>
        <input type="email" [(ngModel)]="inquiryData.email" name="email"
            class="w-full px-4 py-2 bg-white border border-border rounded-xl focus:ring-2 focus:ring-primary" required>
    </div>
    <div>
        <label class="block mb-1 text-sm font-medium">Phone</label>
        <input type="tel" [(ngModel)]="inquiryData.phone" name="phone"
            class="w-full px-4 py-2 bg-white border border-border rounded-xl focus:ring-2 focus:ring-primary" required>
    </div>
    <div>
        <label class="block mb-1 text-sm font-medium">Message</label>
        <textarea rows="4" [(ngModel)]="inquiryData.message" name="message"
            class="w-full px-4 py-2 bg-white border border-border rounded-xl focus:ring-2 focus:ring-primary"></textarea>
    </div>
    <button type="submit" [disabled]="isSubmitting"
        class="w-full bg-primary text-white py-3 rounded-xl font-medium disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isSubmitting ? 'Sending...' : 'Send Inquiry' }}
    </button>
</form>
